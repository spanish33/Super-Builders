name: "Dry Test Samsung Patches"

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      device:
        description: "Device key from samsung-devices.json"
        type: string
        required: true
      mode:
        description: "single = one device, matrix = all devices for same kernel"
        type: choice
        options: [single, matrix]
        default: "single"
  workflow_call:
    inputs:
      device:
        type: string
        required: true
      mode:
        type: string
        default: "single"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.result }}
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - id: resolve
      env:
        MODE: ${{ inputs.mode }}
        DEVICE_KEY: ${{ inputs.device }}
      run: |
        REGISTRY="$GITHUB_WORKSPACE/.github/inputs/samsung-devices.json"
        if [ ! -f "$REGISTRY" ]; then
          echo "FATAL: samsung-devices.json not found"
          exit 1
        fi

        DEVICE_JSON=$(jq -e ".\"${DEVICE_KEY}\"" "$REGISTRY")
        if [ "$DEVICE_JSON" = "null" ] || [ -z "$DEVICE_JSON" ]; then
          echo "FATAL: device '$DEVICE_KEY' not found in registry"
          jq -r 'keys[]' "$REGISTRY" | head -20
          exit 1
        fi

        if [ "$(echo "$DEVICE_JSON" | jq -r '.disabled // false')" = "true" ]; then
          REASON=$(echo "$DEVICE_JSON" | jq -r '.disabled_reason // "no reason given"')
          echo "::warning::Device '$DEVICE_KEY' is disabled: $REASON"
          echo "result=[]" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ "$MODE" != "matrix" ]; then
          echo "result=[{\"device\":\"$DEVICE_KEY\"}]" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        KVER=$(echo "$DEVICE_JSON" | jq -r '.kernel_version')
        DEVICES=$(jq -c --arg kver "$KVER" \
          '[to_entries[] | select(.value.kernel_version == $kver and (.value.disabled // false | not)) | {device: .key}]' \
          "$REGISTRY")
        echo "result=$DEVICES" >> "$GITHUB_OUTPUT"
        echo "Matrix: $(echo "$DEVICES" | jq length) devices for kernel $KVER"

  dry-test:
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: "Dry Test — ${{ matrix.device }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DEVICE_KEY: ${{ matrix.device }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Install Build Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq clang lld llvm flex bison libssl-dev libelf-dev libdw-dev dwarves gcc-aarch64-linux-gnu

    - name: Parse Device Registry
      run: |
        REGISTRY="$GITHUB_WORKSPACE/.github/inputs/samsung-devices.json"
        DEVICE_JSON=$(jq -e ".\"${DEVICE_KEY}\"" "$REGISTRY")

        BRAND=$(echo "$DEVICE_JSON" | jq -r '.brand')
        DEVICE_NAME=$(echo "$DEVICE_JSON" | jq -r '.name')
        SOC=$(echo "$DEVICE_JSON" | jq -r '.soc')
        CODENAME=$(echo "$DEVICE_JSON" | jq -r '.codename // empty')
        ANDROID_VER=$(echo "$DEVICE_JSON" | jq -r '.android_version')
        KERNEL_VER=$(echo "$DEVICE_JSON" | jq -r '.kernel_version')
        SOURCE_REPO=$(echo "$DEVICE_JSON" | jq -r '.source_repo')
        SOURCE_BRANCH=$(echo "$DEVICE_JSON" | jq -r '.source_branch')
        COMMON_PATH=$(echo "$DEVICE_JSON" | jq -r '.common_path')
        FIX_PATCHES_DIR=$(echo "$DEVICE_JSON" | jq -r '.fix_patches_dir // empty')
        WIFI_FIX=$(echo "$DEVICE_JSON" | jq -r '.wifi_fix // false')
        DEFCONFIG_NAME=$(echo "$DEVICE_JSON" | jq -r '.defconfig // "gki_defconfig"')

        VERSION_DIR="${ANDROID_VER}-${KERNEL_VER}"
        if [ ! -d "$GITHUB_WORKSPACE/$VERSION_DIR" ]; then
          case "$KERNEL_VER" in
            5.4)   VERSION_DIR="android12-5.4" ;;
            5.10)  VERSION_DIR="android12-5.10" ;;
            5.15)  VERSION_DIR="android13-5.15" ;;
            6.1)   VERSION_DIR="android14-6.1" ;;
            6.6)   VERSION_DIR="android15-6.6" ;;
            6.12)  VERSION_DIR="android16-6.12" ;;
            *)     echo "::error::No patch directory for kernel $KERNEL_VER"
                   exit 1 ;;
          esac
          echo "::notice::Mapped ${ANDROID_VER}-${KERNEL_VER} -> ${VERSION_DIR}"
        fi
        if [ ! -d "$GITHUB_WORKSPACE/$VERSION_DIR" ]; then
          echo "FATAL: patch directory '$VERSION_DIR' not found"
          exit 1
        fi

        GKI_TAG="${VERSION_DIR}"

        {
          echo "BRAND=$BRAND"
          echo "DEVICE_NAME=$DEVICE_NAME"
          echo "SOC=$SOC"
          echo "CODENAME=$CODENAME"
          echo "ANDROID_VER=$ANDROID_VER"
          echo "KERNEL_VER=$KERNEL_VER"
          echo "SOURCE_REPO=$SOURCE_REPO"
          echo "SOURCE_BRANCH=$SOURCE_BRANCH"
          echo "COMMON_PATH=$COMMON_PATH"
          echo "FIX_PATCHES_DIR=$FIX_PATCHES_DIR"
          echo "WIFI_FIX=$WIFI_FIX"
          echo "DEFCONFIG_NAME=$DEFCONFIG_NAME"
          echo "VERSION_DIR=$VERSION_DIR"
          echo "GKI_TAG=$GKI_TAG"
          echo "OEM_HELPERS=$GITHUB_WORKSPACE/android12-5.10/build-helpers"
        } >> "$GITHUB_ENV"

        echo "Device: $DEVICE_NAME ($BRAND) | SoC: $SOC | Kernel: $KERNEL_VER | Android: $ANDROID_VER"

    - name: Clone Samsung Kernel Source
      run: |
        SYNC_DIR="$GITHUB_WORKSPACE/samsung-source"
        git clone --depth=1 -b "${SOURCE_BRANCH}" \
          "https://github.com/${SOURCE_REPO}.git" "$SYNC_DIR"

        echo "SYNC_DIR=$SYNC_DIR" >> "$GITHUB_ENV"
        echo "KERNEL_COMMON=$SYNC_DIR/$COMMON_PATH" >> "$GITHUB_ENV"
        echo "DEFCONFIG=$SYNC_DIR/$COMMON_PATH/arch/arm64/configs/${DEFCONFIG_NAME}" >> "$GITHUB_ENV"

    - name: Detect Kernel Version
      run: |
        MAKEFILE="$KERNEL_COMMON/Makefile"
        if [ ! -f "$MAKEFILE" ]; then
          echo "FATAL: kernel Makefile not found at $MAKEFILE"
          exit 1
        fi

        SUBLEVEL=$(grep '^SUBLEVEL = ' "$MAKEFILE" | awk '{print $3}')
        DETECTED_KVER="$(grep '^VERSION = ' "$MAKEFILE" | awk '{print $3}').$(grep '^PATCHLEVEL = ' "$MAKEFILE" | awk '{print $3}')"

        if [ "$DETECTED_KVER" != "$KERNEL_VER" ]; then
          echo "::warning::Detected kernel $DETECTED_KVER but device registry says $KERNEL_VER"
        fi

        {
          echo "SUBLEVEL=$SUBLEVEL"
          echo "DETECTED_KVER=$DETECTED_KVER"
        } >> "$GITHUB_ENV"

        echo "Kernel: ${DETECTED_KVER}.${SUBLEVEL}"

    - name: Detect Toolchain
      run: |
        CLANG_DIR=$(find "$SYNC_DIR" -path '*/prebuilts/clang/host/linux-x86/clang-*' -maxdepth 6 -type d 2>/dev/null | sort -V | tail -1)
        if [ -n "$CLANG_DIR" ] && [ -x "$(realpath "$CLANG_DIR")/bin/clang" ]; then
          REAL_PATH="$(realpath "$CLANG_DIR")/bin"
          if [ -x "$REAL_PATH/clang.real" ]; then
            CLANG_BIN="$REAL_PATH"
            echo "Using prebuilt clang: $CLANG_DIR"
          else
            CLANG_BIN="/usr/bin"
            echo "::notice::Prebuilt clang wrapper without clang.real — using system clang"
          fi
        else
          CLANG_BIN="/usr/bin"
          echo "No prebuilt clang — using system clang"
        fi
        echo "CLANG_BIN=$CLANG_BIN" >> "$GITHUB_ENV"

    - name: Fix Old Kernel Compatibility
      run: |
        FIX_SCRIPT="$GITHUB_WORKSPACE/$VERSION_DIR/build-helpers/fix-old-kernel-compat.sh"
        if [ -f "$FIX_SCRIPT" ]; then
          bash "$FIX_SCRIPT" "$KERNEL_COMMON" "$SUBLEVEL"
        fi

    - name: Setup KSU
      working-directory: ${{ env.KERNEL_COMMON }}
      run: |
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "builtin"
        KSU_DIR=$(ls -d KernelSU* 2>/dev/null | head -1)
        [ -d "$KSU_DIR" ] || { echo "FATAL: KSU directory not created"; exit 1; }
        echo "KSU_DIR=$KSU_DIR" >> "$GITHUB_ENV"

        PIN=$(cat "$GITHUB_WORKSPACE/$VERSION_DIR/sukisu-pin.txt" 2>/dev/null || true)
        if [ -n "$PIN" ]; then
          cd "$KSU_DIR"
          git fetch origin
          git checkout "$PIN"
          echo "Pinned SukiSU to $(git rev-parse --short=7 HEAD)"
        fi

    - name: Apply Samsung Fix Patches (Pre-50_)
      working-directory: ${{ env.KERNEL_COMMON }}
      run: |
        if [ -n "$FIX_PATCHES_DIR" ]; then
          FIX_DIR="$GITHUB_WORKSPACE/$VERSION_DIR/samsung-fixes/$FIX_PATCHES_DIR"
          bash "$OEM_HELPERS/apply-samsung-fixes.sh" "$DEVICE_KEY" "$KERNEL_COMMON" "$FIX_DIR"
        fi

    - name: Dry-Test Patches
      run: |
        PATCH_DIR="$GITHUB_WORKSPACE/$VERSION_DIR/SukiSU-Ultra/patches"
        RESULTS=""
        OVERALL=0

        dry_test_patch() {
          local LABEL="$1" PATCH="$2" TARGET_DIR="$3"
          if [ ! -f "$PATCH" ]; then
            RESULTS="${RESULTS}${LABEL}|skipped (no patch)\n"
            return
          fi

          OUTPUT=$(patch -p1 -F3 --dry-run -d "$TARGET_DIR" < "$PATCH" 2>&1) || true
          FUZZ=$(echo "$OUTPUT" | grep -c 'offset\|fuzz' || true)
          REJECTS=$(echo "$OUTPUT" | grep -c 'FAILED\|reject' || true)

          if echo "$OUTPUT" | grep -qi 'FAILED\|reject'; then
            RESULTS="${RESULTS}${LABEL}|REJECT(${REJECTS})\n"
            OVERALL=1
            echo "::error::${LABEL} — patch rejected"
            echo "$OUTPUT" | tail -30
          elif [ "$FUZZ" -gt 0 ]; then
            RESULTS="${RESULTS}${LABEL}|FUZZ(${FUZZ})\n"
            echo "::warning::${LABEL} — applied with fuzz"
          else
            RESULTS="${RESULTS}${LABEL}|CLEAN\n"
          fi
        }

        dry_test_patch "50_upstream_susfs" \
          "$PATCH_DIR/50_add_susfs_in_gki-${GKI_TAG}.patch" \
          "$KERNEL_COMMON"

        PATCH_50="$PATCH_DIR/50_add_susfs_in_gki-${GKI_TAG}.patch"
        CONTEXT_OK=true
        if [ -f "$PATCH_50" ]; then
          if ! patch -p1 -F3 --no-backup-if-mismatch -d "$KERNEL_COMMON" < "$PATCH_50" >/dev/null 2>&1; then
            echo "::warning::50_ failed to apply — skipping 51_/60_ (context unreliable)"
            CONTEXT_OK=false
          fi
        fi

        if [ "$CONTEXT_OK" = "true" ]; then
          dry_test_patch "51_enhanced_susfs" \
            "$PATCH_DIR/51_enhanced_susfs-${GKI_TAG}.patch" \
            "$KERNEL_COMMON"

          PATCH_51="$PATCH_DIR/51_enhanced_susfs-${GKI_TAG}.patch"
          if [ -f "$PATCH_51" ]; then
            if ! patch -p1 -F3 --no-backup-if-mismatch -d "$KERNEL_COMMON" < "$PATCH_51" >/dev/null 2>&1; then
              echo "::warning::51_ failed to apply — skipping 60_ (context unreliable)"
              CONTEXT_OK=false
            fi
          fi
        else
          RESULTS="${RESULTS}51_enhanced_susfs|SKIPPED (50_ context failed)\n"
        fi

        if [ "$CONTEXT_OK" = "true" ]; then
          dry_test_patch "60_zeromount" \
            "$PATCH_DIR/60_zeromount-${GKI_TAG}.patch" \
            "$KERNEL_COMMON"
        else
          RESULTS="${RESULTS}60_zeromount|SKIPPED (prior context failed)\n"
        fi

        echo "PATCH_RESULTS<<EOF" >> "$GITHUB_ENV"
        echo -e "$RESULTS" >> "$GITHUB_ENV"
        echo "EOF" >> "$GITHUB_ENV"
        echo "CONTEXT_OK=$CONTEXT_OK" >> "$GITHUB_ENV"

        if [ "$OVERALL" -ne 0 ]; then
          echo "DRY_TEST_STATUS=FAILED" >> "$GITHUB_ENV"
          exit 1
        fi
        echo "DRY_TEST_STATUS=PASSED" >> "$GITHUB_ENV"

    - name: Apply Remaining Patches
      if: env.DRY_TEST_STATUS == 'PASSED' && env.CONTEXT_OK == 'true'
      working-directory: ${{ env.KERNEL_COMMON }}
      run: |
        PATCH_DIR="$GITHUB_WORKSPACE/$VERSION_DIR/SukiSU-Ultra/patches"

        PATCH_60="$PATCH_DIR/60_zeromount-${GKI_TAG}.patch"
        if [ -f "$PATCH_60" ]; then
          patch -p1 -F3 --no-backup-if-mismatch < "$PATCH_60"
        fi

    - name: Fix SUSFS Compatibility
      if: env.DRY_TEST_STATUS == 'PASSED'
      working-directory: ${{ env.KERNEL_COMMON }}
      run: |
        FIX="$GITHUB_WORKSPACE/$VERSION_DIR/build-helpers/fix-susfs-compat.sh"
        if [ -f "$FIX" ]; then
          bash "$FIX" . "$SUBLEVEL" "$ANDROID_VER" "$KERNEL_VER" ""
        fi

    - name: Assemble Defconfig
      if: env.DRY_TEST_STATUS == 'PASSED'
      working-directory: ${{ env.SYNC_DIR }}
      run: |
        OEM_DEFCONFIG_SCRIPT="$OEM_HELPERS/assemble-oem-defconfig.sh"
        if [ -f "$OEM_DEFCONFIG_SCRIPT" ]; then
          KCONFIG_SEARCH_DIR="$KERNEL_COMMON" \
            bash "$OEM_DEFCONFIG_SCRIPT" "$DEFCONFIG" "SukiSU"
        fi

    - name: Disable Samsung Security
      if: env.DRY_TEST_STATUS == 'PASSED'
      run: |
        bash "$OEM_HELPERS/disable-samsung-security.sh" "$DEFCONFIG"
        for extra in "$KERNEL_COMMON"/arch/arm64/configs/*-bazel_defconfig; do
          [ -f "$extra" ] && bash "$OEM_HELPERS/disable-samsung-security.sh" "$extra" || true
        done

    - name: Samsung WiFi/BT Fix
      if: env.DRY_TEST_STATUS == 'PASSED' && env.WIFI_FIX == 'true'
      run: |
        bash "$OEM_HELPERS/samsung-wifi-fix.sh" "$KERNEL_COMMON"

    - name: Targeted Compilation
      if: env.DRY_TEST_STATUS == 'PASSED'
      working-directory: ${{ env.KERNEL_COMMON }}
      run: |
        export PATH="${CLANG_BIN}:$PATH"

        # Samsung Exynos Kconfig uses $(PLATFORM_VERSION_FOR_GPU) comparison
        # syntax not supported by standard Kconfig parser — strip those lines
        find . -name Kconfig -exec grep -l 'PLATFORM_VERSION_FOR_GPU' {} \; 2>/dev/null |
          xargs -r sed -i '/\$(PLATFORM_VERSION_FOR_GPU)/d'

        sed -i 's|\(.\)obj-\$(CONFIG_KSU) += kernelsu/|\1\nobj-$(CONFIG_KSU) += kernelsu/|' drivers/Makefile 2>/dev/null || true

        REAL_CLANG=$(command -v clang)
        printf '#!/bin/bash\nargs=()\nfor a in "$@"; do [[ "$a" == -Werror* ]] || args+=("$a"); done\nexec "%s" "${args[@]}"\n' "$REAL_CLANG" > /tmp/clang-no-werror
        chmod +x /tmp/clang-no-werror

        MAKE="make O=out ARCH=arm64 LLVM=1 \
          CC=/tmp/clang-no-werror LD=ld.lld AR=llvm-ar NM=llvm-nm \
          OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-gnu-"

        $MAKE "${DEFCONFIG_NAME}"
        $MAKE -j"$(nproc)" prepare

        PATCH_DIR="$GITHUB_WORKSPACE/$VERSION_DIR/SukiSU-Ultra/patches"
        TARGETS=()
        for PFILE in \
          "$PATCH_DIR/50_add_susfs_in_gki-${GKI_TAG}.patch" \
          "$PATCH_DIR/51_enhanced_susfs-${GKI_TAG}.patch" \
          "$PATCH_DIR/60_zeromount-${GKI_TAG}.patch"; do
          [ -f "$PFILE" ] || continue
          while IFS= read -r cfile; do
            [ -n "$cfile" ] && TARGETS+=("${cfile%.c}.o")
          done < <(grep '^+++ b/' "$PFILE" | sed 's|^+++ b/||; s|[[:space:]].*||' | grep '\.c$' | sort -u)
        done

        for dir in fs/susfs fs/zeromount; do
          [ -d "$dir" ] || continue
          for f in "$dir"/*.c; do
            [ -f "$f" ] && TARGETS+=("${f%.c}.o")
          done
        done

        mapfile -t TARGETS < <(printf '%s\n' "${TARGETS[@]}" | sort -u)

        echo "Compiling ${#TARGETS[@]} targets:"
        printf '  %s\n' "${TARGETS[@]}"

        COMPILE_RC=0
        $MAKE -j"$(nproc)" "${TARGETS[@]}" || COMPILE_RC=$?

        if [ "$COMPILE_RC" -ne 0 ]; then
          echo "::error::Targeted compilation failed (exit $COMPILE_RC)"
          echo "COMPILE_STATUS=FAILED" >> "$GITHUB_ENV"
          echo "COMPILE_TARGET_COUNT=${#TARGETS[@]}" >> "$GITHUB_ENV"
          exit 1
        fi
        echo "COMPILE_STATUS=PASSED" >> "$GITHUB_ENV"
        echo "COMPILE_TARGET_COUNT=${#TARGETS[@]}" >> "$GITHUB_ENV"

    - name: Scan Patch Rejects
      if: always()
      run: |
        REJECTS_DIR="$GITHUB_WORKSPACE/patch-rejects"
        mkdir -p "$REJECTS_DIR"
        mapfile -t REJS < <(find "$SYNC_DIR" -type f -name '*.rej' 2>/dev/null)
        REJ_COUNT=${#REJS[@]}
        echo "REJ_COUNT=$REJ_COUNT" >> "$GITHUB_ENV"
        if [ "$REJ_COUNT" -gt 0 ]; then
          for REJ in "${REJS[@]}"; do
            REL="${REJ#"$SYNC_DIR"/}"
            DEST="$REJECTS_DIR/$REL"
            mkdir -p "$(dirname "$DEST")"
            cp "$REJ" "$DEST"
            ORIG="${REJ%.rej}"
            [ -f "$ORIG" ] && cp "$ORIG" "$REJECTS_DIR/${REL%.rej}"
          done
        fi

    - name: Upload Rejects
      if: always() && env.REJ_COUNT > 0
      uses: actions/upload-artifact@v7
      with:
        name: dry-test-samsung-${{ matrix.device }}-rejects
        path: patch-rejects/
        if-no-files-found: ignore
        compression-level: 9

    - name: Job Summary
      if: always()
      run: |
        {
          echo "## Dry Test: ${DEVICE_NAME} (${DEVICE_KEY})"
          echo ""
          echo "| Property | Value |"
          echo "|----------|-------|"
          echo "| **Brand** | ${BRAND} |"
          echo "| **SoC** | ${SOC} |"
          echo "| **Kernel** | ${KERNEL_VER}.${SUBLEVEL} |"
          echo "| **Android** | ${ANDROID_VER} |"
          echo "| **Source** | ${SOURCE_REPO} @ ${SOURCE_BRANCH} |"
          echo "| **Patch Dir** | ${VERSION_DIR} |"
          echo "| **Toolchain** | ${CLANG_BIN} |"
          echo "| **Samsung Security** | Disabled |"
          echo "| **WiFi Fix** | ${WIFI_FIX} |"
          echo ""
          echo "### Patch Results"
          echo ""
          echo "| Patch | Result |"
          echo "|-------|--------|"
          echo -e "$PATCH_RESULTS" | while IFS='|' read -r name result; do
            [ -z "$name" ] && continue
            echo "| $name | $result |"
          done
          echo ""
          echo "### Compilation"
          echo ""
          echo "| Metric | Value |"
          echo "|--------|-------|"
          echo "| **Targets** | ${COMPILE_TARGET_COUNT:-skipped} |"
          echo "| **Status** | ${COMPILE_STATUS:-skipped} |"
          echo ""
          echo "**Rejects:** ${REJ_COUNT:-0}"
          echo ""
          echo "**Overall:** ${DRY_TEST_STATUS:-unknown} / ${COMPILE_STATUS:-skipped}"
        } >> "$GITHUB_STEP_SUMMARY"
